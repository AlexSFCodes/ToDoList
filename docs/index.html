<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplicación de lista de tareas para organizar tus pendientes de forma sencilla" />
    <link rel="icon" type="image/svg+xml" href="/ToDoList/vite.svg" />
    <title>Mi Lista de Tareas</title>
    <script type="module" crossorigin src="/ToDoList/assets/index-BFzRtIZ6.js"></script>
    <link rel="stylesheet" crossorigin href="/ToDoList/assets/index-BvE_SoyD.css">
  </head>
  <body>
    <!-- HEADER -->
    <header role="banner">
      <h1 class="title">Mi Lista de Tareas</h1>
      <button id="logoutBtn" class="logout-btn" type="button" aria-label="Cerrar sesión" hidden="hidden">
        Cerrar sesión
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="wrap" role="main">
      <!-- Navigation Buttons (hidden until logged in) -->
      <nav class="container" aria-label="Navegación principal" hidden="hidden">
        <button id="myHomeworks" class="button" type="button" aria-label="Ver mis tareas">
          Mis tareas
        </button>
        <button id="addToDo" class="button" type="button" aria-label="Agregar nueva tarea">
          Agregar tarea
        </button>
      </nav>

      <!-- Dynamic content renders here -->
      <div id="father"></div>
    </main>

  </body>
</html>
